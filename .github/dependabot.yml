# Dependabot config — keep SHA-pinned third-party GitHub Actions current.
# We pin actions to commit SHAs (see .github/workflows/ci.yml) for
# supply-chain hygiene; Dependabot updates the SHA + trailing `# vX.Y.Z`
# comment whenever a new release ships.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
