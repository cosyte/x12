version: 2
updates:
  # npm dev-dependencies (the parsers ship zero runtime deps)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
  # keep GitHub Actions references current
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
