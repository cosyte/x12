name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        # SHA-pinned (supply-chain hygiene): pnpm/action-setup is a third-party
        # action outside GitHub's trust boundary, so we pin to a full commit
        # SHA rather than the mutable `v4` tag. Dependabot (see
        # .github/dependabot.yml) bumps both the SHA and the trailing
        # `# v4.x.y` comment when a new release ships.
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          # `version` is read from `packageManager` in package.json (pnpm@10.33.4).
          # Do not install deps here; the setup-node step caches the pnpm store
          # first, then we run `pnpm install --frozen-lockfile` explicitly.
          run_install: false

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify dual ESM + CJS exports resolution
        run: pnpm run verify:exports
