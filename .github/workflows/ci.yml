name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Universal gates from the shared pipeline (typecheck, lint, format, test, coverage, build, attw,
  # dual ESM/CJS smoke, actionlint) on the standard Node matrix (22 + 24). x12 ships a PHI scanner,
  # so the shared pipeline's optional PHI-scan step is switched on.
  ci:
    uses: cosyte/.github/.github/workflows/ci.yml@main
    with:
      run-phi-scan: true

  # Prove the publish pipeline on every push/PR WITHOUT burning a version or needing registry auth
  # (X12-10, mirroring config's REL-PIPE). Two auth-free proofs:
  #   1. `pnpm publish --dry-run` exercises the real publish command path (manifest, `files` set,
  #      access, tag) — the release itself publishes via `changeset publish`, so this is a faithful
  #      proxy. It runs `--ignore-scripts` because the `prepublishOnly` gates (typecheck/lint/test/
  #      build/attw) already run in the `ci` job above on this same commit — re-running them here is
  #      redundant, and `attw --pack .` inside `prepublishOnly` breaks under `pnpm publish` (it can't
  #      find its own packed tarball). We build explicitly first so a real `dist/` is present.
  #   2. `npm pack --dry-run` asserts the publishable tarball actually assembles with the right file
  #      set + built `dist/` — independent of what's already on npm (`publish --dry-run` skips an
  #      already-published version; `pack` never does). A red in either step means a real release
  #      would fail. The real provenance publish stays gated on the public flip (PUB-FLIP / X12-PUB).
  release-dry-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Exercise the publish command path (auth-free dry run; never uploads).
      - name: Publish dry-run
        run: pnpm publish --dry-run --no-git-checks --ignore-scripts
      # Assert the publishable tarball assembles (catches missing files/dist/exports) even when the
      # current version is already on npm — which `publish --dry-run` skips.
      - name: Pack integrity
        run: npm pack --dry-run --ignore-scripts
