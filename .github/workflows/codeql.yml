name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codeql:
    permissions:
      security-events: write # upload the SARIF to the Security tab
      contents: read
      actions: read
    uses: cosyte/.github/.github/workflows/codeql.yml@main
