name: Release

# Thin caller of the shared release pipeline: Changesets -> npm publish (provenance auto-enables when
# this repo is public) -> docs artifacts -> GitHub release -> repository_dispatch to cosyte/docs.
# Requires the NPM_TOKEN and DOCS_REPO_DISPATCH_TOKEN secrets (passed via `secrets: inherit`).

on:
  push:
    branches: [main]

jobs:
  release:
    # Required. The repo default for GITHUB_TOKEN is `contents: read`, and a called workflow can only
    # downgrade the caller's token, never escalate it — so without this the shared pipeline's
    # `contents/id-token/pull-requests: write` is an escalation and GitHub rejects the whole workflow
    # at startup (1s, no jobs, no logs). That is what every Release run did from June until this.
    permissions:
      contents: write # create tags / the GitHub release
      id-token: write # npm provenance
      pull-requests: write # open the "Version Packages" PR
    uses: cosyte/.github/.github/workflows/release.yml@main
    with:
      package-name: "@cosyte/x12"
    secrets: inherit
